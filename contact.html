    <h1>Contact us</h1>
    <script>
        function validate(){
            var name = document.getElementById("name").value;
            var Email = document.getElementById("Email").value;
            var Contact_No = document.getElementById("Contact_No").value;
            var Message = document.getElementById("Message").value;
        
            if(name == "")
            {
                alert("Please Enter the name");
            }
            else if(Email == "")
            {
                alert("Please Enter the email");
            }
            else if(Contact_No == "")
            {
                alert("Please Enter the Contact number");
            }
            else if(Message == "")
            {
                alert("Please write Message");
            }
            else
            {
                alert("Message send successfully!");
            }
        
        }
    </script>
    <form>
        <div class="container">
            <div>
                <form action="MAILTO:DonationCampaign@email.com">
                  <label for="fname">First Name</label>
                  <input type="text" id="fname" name="firstname" placeholder="Your name..">
              
                  <label for="lname">Last Name</label>
                  <input type="text" id="lname" name="lastname" placeholder="Your last name..">

                  <label for="email">Email</label>
                  <input type="email" id="lname" name="email" placeholder="Your email..">
              
                  <label for="country">Country</label>
                  <select id="country" name="country">
                    <option value="australia">India</option>
                    <option value="canada">Canada</option>
                    <option value="usa">USA</option>
                  </select>
                
                  <label for="Message">Message/Query</label>
                  <br>
                  <textarea  name="Message" placeholder="Write Message or Query.."  cols ="103" rows="3"></textarea> 

                  <input type="submit" value="Submit" class="btn" onclick="validate()">
                </form>
              </div>
        </div>
    </form>
